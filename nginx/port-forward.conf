user nginx;
worker_processes auto;

error_log /var/log/nginx/error.log warn;
pid       /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile          on;
    keepalive_timeout 65;

    # Docker's embedded DNS resolver — required for variable-based proxy_pass
    resolver 127.0.0.11 valid=30s ipv6=off;

    # WebSocket upgrade map
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ── Port-forwarding server ───────────────────────────────────────────
    # Matches any request whose Host is {port}.dev.samrudhraikote.me and
    # reverse-proxies it directly to code-server:{port}.
    # No authentication — ports are public once forwarded.
    server {
        listen 80;
        server_name ~^(?<forward_port>[0-9]+)\.samrudhraikote\.me$;

        location / {
            # Build upstream from the captured subdomain port
            set $upstream_target http://code-server:$forward_port;

            proxy_pass         $upstream_target;
            proxy_http_version 1.1;

            # WebSocket support
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;

            # Pass real-host / origin info to the proxied app so absolute
            # URLs (e.g. Next.js /_next/static/…) resolve correctly.
            proxy_set_header   Host                $host;
            proxy_set_header   X-Real-IP           $remote_addr;
            proxy_set_header   X-Forwarded-For     $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto   $scheme;

            proxy_read_timeout  86400;
            proxy_send_timeout  86400;
            proxy_buffering     off;

            # Allow large uploads / responses
            client_max_body_size 50m;
        }
    }

    # ── Catch-all — reject everything else ──────────────────────────────
    server {
        listen      80 default_server;
        server_name _;
        return      444;
    }
}
