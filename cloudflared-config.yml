# Cloudflare Tunnel Configuration
# See: https://developers.cloudflare.com/cloudflare-one/connections/connect-networks/
#
# To set up:
#   1. cloudflared tunnel login
#   2. cloudflared tunnel create letmecook
#   3. Replace the values below with your tunnel ID, credentials path, and hostname
#   4. cloudflared tunnel route dns letmecook yourdomain.com
#   5. cloudflared tunnel --config cloudflared-config.yml run

tunnel: c1ba3379-10e0-4577-956e-af818cb36312
credentials-file: /home/sciboyrocks/.cloudflared/c1ba3379-10e0-4577-956e-af818cb36312.json

ingress:
  - hostname: letmecook.samrudhraikote.me
    service: http://localhost:3001
    originRequest:
      noTLSVerify: true
      connectTimeout: 30s
      httpHostHeader: letmecook.samrudhraikote.me
  # Wildcard: any {port}.samrudhraikote.me → nginx → code-server:{port}
  # Requires a wildcard CNAME in Cloudflare DNS:
  #   *.samrudhraikote.me → c1ba3379-10e0-4577-956e-af818cb36312.cfargotunnel.com
  # Note: explicit records (e.g. letmecook.samrudhraikote.me) take priority in
  # Cloudflare DNS, so the main app is not affected by this wildcard.
  - hostname: "*.samrudhraikote.me"
    service: http://localhost:8889
    originRequest:
      noTLSVerify: true
      connectTimeout: 30s
  - service: http_status:404
